# =============================================================================
# Example OpenFGA relationship tuples for Coact
# =============================================================================

# --- Global admin ---
# (set ADMIN_USERNAMES users as admins on each facility)
- user: user:admin_user
  relation: admin
  object: facility:slac

# --- Facility czars ---
- user: user:czar_alice
  relation: czar
  object: facility:slac

# --- Repo belongs to facility ---
- user: facility:slac
  relation: facility
  object: repo:slac/default

# --- Repo roles ---
- user: user:pi_bob
  relation: principal
  object: repo:slac/default

- user: user:leader_carol
  relation: leader
  object: repo:slac/default

- user: user:member_dave
  relation: user_member
  object: repo:slac/default

# =============================================================================
# Clusters (Slurm Partitions)
# =============================================================================

# Cluster "roma" maps to Slurm partition "roma"
- user: user:admin_user
  relation: admin
  object: cluster:roma

# Cluster "milano" maps to Slurm partition "milano"
- user: user:admin_user
  relation: admin
  object: cluster:milano

# Make clusters visible to everyone
- user: user:*
  relation: can_view
  object: cluster:roma

- user: user:*
  relation: can_view
  object: cluster:milano

# =============================================================================
# Features — Slurm
# =============================================================================

# Create a feature object for the slurm feature on this repo
- user: repo:slac/default
  relation: repo
  object: feature:slac/default/slurm

# Enable the feature (user:* means the gate is open for all matched users)
- user: user:*
  relation: enabled
  object: feature:slac/default/slurm

# Link the slurm account to its feature and facility
- user: feature:slac/default/slurm
  relation: feature
  object: slurm_account:slac:default

- user: facility:slac
  relation: facility
  object: slurm_account:slac:default

# Link the slurm account to its partition(s) / cluster(s)
- user: cluster:roma
  relation: partition
  object: slurm_account:slac:default

- user: cluster:milano
  relation: partition
  object: slurm_account:slac:default

# =============================================================================
# Slurm QoS levels
# =============================================================================

# Make QoS levels visible to everyone
- user: user:*
  relation: can_view
  object: slurm_qos:normal

- user: user:*
  relation: can_view
  object: slurm_qos:preemptable

- user: user:*
  relation: can_view
  object: slurm_qos:onshift

- user: user:*
  relation: can_view
  object: slurm_qos:offshift

# =============================================================================
# Slurm Submissions — account + partition + QoS intersection
#
# Object IDs are formatted as <account>|<partition>|<qos>
#
# Scenario: facility "slac" HAS purchased nodes on cluster "roma",
# but has NOT purchased nodes on cluster "milano".
# =============================================================================

# --- roma partition, normal QoS (non-preemptable) ---
# Facility slac has purchased nodes on roma, so purchase_satisfied is set
- user: slurm_account:slac:default
  relation: account
  object: slurm_submission:slac:default|roma|normal

- user: cluster:roma
  relation: partition
  object: slurm_submission:slac:default|roma|normal

- user: slurm_qos:normal
  relation: qos
  object: slurm_submission:slac:default|roma|normal

# Gate OPEN: facility has active compute purchases for roma
- user: user:*
  relation: purchase_satisfied
  object: slurm_submission:slac:default|roma|normal

# --- roma partition, preemptable QoS ---
# Preemptable is always allowed — gate is always open
- user: slurm_account:slac:default
  relation: account
  object: slurm_submission:slac:default|roma|preemptable

- user: cluster:roma
  relation: partition
  object: slurm_submission:slac:default|roma|preemptable

- user: slurm_qos:preemptable
  relation: qos
  object: slurm_submission:slac:default|roma|preemptable

# Gate OPEN: preemptable never requires purchases
- user: user:*
  relation: purchase_satisfied
  object: slurm_submission:slac:default|roma|preemptable

# --- milano partition, preemptable QoS ---
# Facility slac has NOT purchased nodes on milano, so only preemptable is available
- user: slurm_account:slac:default
  relation: account
  object: slurm_submission:slac:default|milano|preemptable

- user: cluster:milano
  relation: partition
  object: slurm_submission:slac:default|milano|preemptable

- user: slurm_qos:preemptable
  relation: qos
  object: slurm_submission:slac:default|milano|preemptable

# Gate OPEN: preemptable never requires purchases
- user: user:*
  relation: purchase_satisfied
  object: slurm_submission:slac:default|milano|preemptable

# --- milano partition, normal QoS (non-preemptable) ---
# NOTE: purchase_satisfied is NOT set because facility has no purchases on milano.
# This means can_submit will be DENIED for normal QoS on milano.
- user: slurm_account:slac:default
  relation: account
  object: slurm_submission:slac:default|milano|normal

- user: cluster:milano
  relation: partition
  object: slurm_submission:slac:default|milano|normal

- user: slurm_qos:normal
  relation: qos
  object: slurm_submission:slac:default|milano|normal

# Gate CLOSED: no purchase_satisfied tuple → can_submit will be denied

