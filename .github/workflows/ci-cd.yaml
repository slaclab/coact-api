name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start MongoDB with initialization
        run: |
          # Build MongoDB image with proper initialization
          docker build -f Dockerfile.mongo --target dev -t coact-mongodb:test .

          # Start MongoDB container
          docker run -d \
            --name mongodb-test \
            -p 27017:27017 \
            -e MONGO_INITDB_DATABASE=iris_test \
            coact-mongodb:test

          # Wait for MongoDB to be ready and initialized
          echo "Waiting for MongoDB initialization..."
          timeout 120 bash -c '
            until docker exec mongodb-test mongosh iris --eval "
              try {
                const user = db.users.findOne({username: \"regular_user\"});
                const version = db.versions.findOne();
                if (user && version && version.dbschema) {
                  print(\"✅ Database ready with version: \" + version.dbschema);
                  quit(0);
                }
                quit(1);
              } catch(e) {
                print(\"⏳ Still initializing...\");
                quit(1);
              }
            " --quiet 2>/dev/null
            do
              sleep 3
            done
          '

          # Verify initialization
          echo "📊 Database verification:"
          docker exec mongodb-test mongosh iris --eval "
            print(\"Users: \" + db.users.countDocuments());
            print(\"Facilities: \" + db.facilities.countDocuments());
            print(\"Schema version: \" + db.versions.findOne().dbschema);
          " --quiet

      - name: Install dependencies
        run: |
          python -m pip install uv
          uv pip install .[test]
          uv pip install -e ./client

      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ -v
        env:
          MONGODB_URL: mongodb://localhost:27017/
          DB_NAME: iris_test_unit
          ADMIN_USERNAMES: admin
          LOG_LEVEL: INFO

      - name: Run integration tests
        run: |
          # Start the API server in background
          uvicorn main:app --host 0.0.0.0 --port 8001 &
          API_PID=$!

          # Wait for the server to be ready
          timeout 30 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' localhost:8001/docs)" != "200" ]]; do sleep 1; done'
          echo "✅ API server ready"

          # Test GraphQL endpoint
          curl -H "Content-Type: application/json" \
               -H "REMOTE_USER: regular_user" \
               -d '{"query":"query { whoami { username } }"}' \
               http://localhost:8001/graphql

          # Run integration tests
          REMOTE_USER=regular_user uv run pytest client/tests/ -v --tb=short
        env:
          MONGODB_URL: mongodb://localhost:27017/
          DB_NAME: iris_test
          ADMIN_USERNAMES: admin
          LOG_LEVEL: INFO
          USERNAME_FIELD: REMOTE_USER
          COACT_GRAPHQL_ENDPOINT: http://localhost:8001/graphql

      - name: Cleanup
        if: always()
        run: |
          docker stop mongodb-test || true
          docker rm mongodb-test || true
